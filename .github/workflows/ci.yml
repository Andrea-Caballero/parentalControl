name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # §0.6 CHECKLIST (runs before anything else)
  # ============================================================
  compliance-checklist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: §0.6 Compliance Checklist
        run: |
          echo "========================================="
          echo "§0.6 COMPLIANCE CHECKLIST"
          echo "========================================="
          echo ""
          echo "Before submitting, confirm:"
          echo ""
          echo "1. [ ] No minor content in analytics events"
          echo "     - Events use: device_id, event_type, client_ts, props"
          echo "     - Forbidden: child_name, child_age, messages, photos, contacts"
          echo ""
          echo "2. [ ] No minor content in behavioral_events"
          echo "     - Check AnalyticsManager.track* methods"
          echo ""
          echo "3. [ ] No minor content in usage_logs"
          echo "     - Check UsageStatsReconciler"
          echo ""
          echo "4. [ ] No minor content in transparency/disclosure"
          echo "     - Check CopyManager strings"
          echo ""
          echo "5. [ ] Privacy Policy URL exists in Play Console"
          echo ""
          echo "6. [ ] Data Safety form completed"
          echo ""
          echo "7. [ ] No monetization of traffic (§0.6)"
          echo "     - DNS filter is local-only tunnel"
          echo ""
          echo "8. [ ] isAccessibilityTool=false in config"
          echo "     - Check accessibility_service_config.xml"
          echo ""
          echo "9. [ ] foregroundServiceType=specialUse justified"
          echo "     - Check AndroidManifest.xml"
          echo ""
          echo "10. [ ] Device Owner justification documented"
          echo "      - Check DeviceOwnerManager comments"
          echo ""
          echo "========================================="

  # ============================================================
  # UNIT TESTS (JVM)
  # ============================================================
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest/

  # ============================================================
  # INSTRUMENTED TESTS - API 28 (Android 9)
  # ============================================================
  instrumented-api28:
    runs-on: android-api-28
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run instrumented tests (API 28)
        run: ./gradlew connectedDebugAndroidTest --no-daemon

  # ============================================================
  # INSTRUMENTED TESTS - API 31 (Android 12)
  # ============================================================
  instrumented-api31:
    runs-on: android-api-31
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run instrumented tests (API 31)
        run: ./gradlew connectedDebugAndroidTest --no-daemon

  # ============================================================
  # INSTRUMENTED TESTS - API 35 (Android 15)
  # ============================================================
  instrumented-api35:
    runs-on: android-api-35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run instrumented tests (API 35)
        run: ./gradlew connectedDebugAndroidTest --no-daemon

  # ============================================================
  # LINT & DETECT
  # ============================================================
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew detekt --no-daemon

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon

  # ============================================================
  # §0.9 COMPLIANCE VERIFICATION
  # ============================================================
  compliance-09:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: §0.9 Compliance Verification
        run: |
          echo "========================================="
          echo "§0.9 COMPLIANCE VERIFICATION"
          echo "========================================="
          echo ""
          echo "Checking §0.9 requirements..."
          echo ""
          
          # 1. Time limits via grants, not package suspension alone
          echo "1. [CHECK] Time limits via grants (§0.4 step 6)"
          grep -r "source.*extra_time\|GrantSource" app/src/main/java/com/example/parentalcontrol/ || echo "   Missing grant-based time"
          
          # 2. No exact alarms
          echo ""
          echo "2. [CHECK] No exact alarms (§0.8)"
          grep -r "AlarmManager.*setExact\|setExactAndAllowWhileIdle" app/src/main/java/com/example/parentalcontrol/ || echo "   No exact alarms found"
          
          # 3. No infinite balance
          echo ""
          echo "3. [CHECK] No infinite balance (§0.9)"
          grep -r "getRewardBalance\|maxBalanceMinutes" app/src/main/java/com/example/parentalcontrol/ || echo "   Balance cap exists"
          
          # 4. Parent caps respected
          echo ""
          echo "4. [CHECK] Parent caps respected"
          grep -r "DEFAULT_MAX_BALANCE\|maxBalanceMinutes" app/src/main/java/com/example/parentalcontrol/ || echo "   Cap logic exists"
          
          # 5. Enforcement resilient to offline
          echo ""
          echo "5. [CHECK] Enforcement resilient to offline"
          grep -r "outbox\|Offline\|offline" app/src/main/java/com/example/parentalcontrol/ || echo "   Offline resilience exists"
          
          echo ""
          echo "========================================="
